<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hybrid Duel - Multi-Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;700&display=swap');
        
        body {
            margin: 0;
            background-color: #020617;
            color: white;
            font-family: 'Noto Sans JP', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none;
        }

        #game-container {
            position: relative;
            border: 4px solid #1e293b;
            background: #000;
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            overflow: hidden;
            width: 1100px;
            max-width: 95vw;
            aspect-ratio: 2 / 1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .hud {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            font-family: 'Orbitron', sans-serif;
            z-index: 20;
        }

        .health-container { width: 30%; }
        .health-bar-bg {
            height: 15px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
        }

        .health-bar-fill {
            height: 100%;
            width: 100%;
            transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        #p1-health-fill { background: linear-gradient(90deg, #2563eb, #60a5fa); }
        #p2-health-fill { background: linear-gradient(90deg, #dc2626, #f87171); }

        .timer-box {
            background: rgba(15, 23, 42, 0.9);
            border: 2px solid #fbbf24;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 20px;
            color: #fbbf24;
        }

        /* Mobile Controls Overlay - Hidden by default */
        .mobile-controls {
            position: absolute;
            bottom: 15px;
            width: 100%;
            display: none; /* Will be shown via JS if touch device detected */
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            z-index: 60;
        }

        .control-group {
            display: flex;
            gap: 12px;
            pointer-events: auto;
        }

        .btn-circle {
            width: 65px;
            height: 65px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 13px;
            user-select: none;
            backdrop-filter: blur(2px);
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s, background 0.1s;
        }

        .btn-circle:active {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(0.92);
        }

        .btn-blue { border-color: rgba(59, 130, 246, 0.5); color: #60a5fa; }
        .btn-red { border-color: rgba(239, 68, 68, 0.5); color: #f87171; }
        .btn-yellow { border-color: rgba(251, 191, 36, 0.5); color: #fbbf24; }

        #notice-display {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 40px;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
            text-align: center;
            text-transform: uppercase;
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(8px);
        }

        .skill-icon { height: 4px; background: #1e293b; border-radius: 2px; margin-top: 2px; overflow: hidden; }
        .cd-progress { height: 100%; width: 100%; background: #fff; }

        @media (max-width: 768px) {
            .btn-circle { width: 55px; height: 55px; font-size: 11px; }
            .mobile-controls { bottom: 8px; padding: 0 10px; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="notice-display">PARRIED</div>
        
        <div class="hud">
            <div class="health-container">
                <div class="health-bar-bg"><div id="p1-health-fill" class="health-bar-fill"></div></div>
                <div class="flex gap-1 mt-1">
                    <div class="flex-1"><div class="skill-icon"><div id="p1-s-cd" class="cd-progress"></div></div></div>
                    <div class="flex-1"><div class="skill-icon"><div id="p1-q-cd" class="cd-progress" style="background: #fbbf24;"></div></div></div>
                    <div class="flex-1"><div class="skill-icon"><div id="p1-e-cd" class="cd-progress" style="background: #ef4444;"></div></div></div>
                </div>
            </div>

            <div id="timer" class="timer-box">99</div>

            <div class="health-container flex flex-col items-end">
                <div class="health-bar-bg w-full"><div id="p2-health-fill" class="health-bar-fill"></div></div>
                <div class="flex gap-1 mt-1 w-full">
                    <div class="flex-1"><div class="skill-icon"><div id="p2-o-cd" class="cd-progress" style="background: #ef4444;"></div></div></div>
                    <div class="flex-1"><div class="skill-icon"><div id="p2-u-cd" class="cd-progress" style="background: #fbbf24;"></div></div></div>
                    <div class="flex-1"><div class="skill-icon"><div id="p2-k-cd" class="cd-progress"></div></div></div>
                </div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <!-- Mobile Controls (Auto-detected) -->
        <div id="mobile-ui" class="mobile-controls">
            <div class="flex flex-col gap-3">
                <div class="control-group">
                    <div class="btn-circle btn-blue" id="btn-p1-a">LEFT</div>
                    <div class="btn-circle btn-blue" id="btn-p1-w">JUMP</div>
                    <div class="btn-circle btn-blue" id="btn-p1-d">RIGHT</div>
                </div>
                <div class="control-group">
                    <div class="btn-circle btn-blue" id="btn-p1-dash">DASH</div>
                    <div class="btn-circle" id="btn-p1-s">SLASH</div>
                    <div class="btn-circle btn-yellow" id="btn-p1-q">PARRY</div>
                    <div class="btn-circle btn-red" id="btn-p1-e">ULT</div>
                </div>
            </div>
            
            <div class="flex flex-col gap-3 items-end">
                <div class="control-group">
                    <div class="btn-circle btn-red" id="btn-p2-j">LEFT</div>
                    <div class="btn-circle btn-red" id="btn-p2-i">JUMP</div>
                    <div class="btn-circle btn-red" id="btn-p2-l">RIGHT</div>
                </div>
                <div class="control-group">
                    <div class="btn-circle btn-red" id="btn-p2-o">ULT</div>
                    <div class="btn-circle btn-yellow" id="btn-p2-u">PARRY</div>
                    <div class="btn-circle" id="btn-p2-k">SLASH</div>
                    <div class="btn-circle btn-red" id="btn-p2-dash">DASH</div>
                </div>
            </div>
        </div>

        <div id="overlay">
            <div class="text-white text-center">
                <h1 id="win-text" class="text-5xl font-black mb-8 italic">VICTORY</h1>
                <button onclick="location.reload()" class="bg-white text-black px-12 py-3 font-black hover:bg-blue-500 hover:text-white transition-all">REMATCH</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1100;
        canvas.height = 550;

        // Detection of Touch Device
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        if (isTouchDevice) {
            document.getElementById('mobile-ui').style.display = 'flex';
        }

        const config = {
            gravity: 0.7,
            groundY: 480,
            moveSpeed: 7,
            dashForce: 18,
            jumpForce: -16,
            attackWindup: 180,
            ultCharge: 1500,
            slashCD: 800,
            parryCD: 4000,
            ultCD: 14000,
            parryWindow: 350
        };

        const keys = {};
        let gameActive = true;
        let timeLeft = 99;
        let particles = [];

        class Particle {
            constructor(x, y, color, speed) {
                this.x = x; this.y = y; this.color = color;
                this.vx = (Math.random() - 0.5) * speed;
                this.vy = (Math.random() - 0.5) * speed;
                this.life = 1.0;
                this.decay = 0.03 + Math.random() * 0.05;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, 4, 4);
                ctx.globalAlpha = 1;
            }
        }

        class Fighter {
            constructor({ pos, color, id }) {
                this.id = id; this.pos = pos; this.vel = { x: 0, y: 0 };
                this.width = 50; this.height = 130; this.color = color;
                this.health = 100; this.facing = id === 1 ? 1 : -1;
                this.state = 'idle';
                this.timer = 0;
                this.lastCD = { slash: 0, parry: 0, ult: 0 };
                this.isUlt = false;
                this.dashCD = 0;
            }

            draw() {
                ctx.save();
                ctx.translate(this.pos.x + this.width/2, this.pos.y + this.height/2);
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(0, (config.groundY - (this.pos.y + this.height/2)), 45, 12, 0, 0, Math.PI*2);
                ctx.fill();

                let bodyColor = this.color;
                if (this.state === 'stun') bodyColor = '#475569';
                if (this.state === 'parry') bodyColor = '#fbbf24';
                if (this.state === 'ult_charge') bodyColor = Math.sin(Date.now()*0.02) > 0 ? '#ff0000' : '#450a0a';

                ctx.fillStyle = bodyColor;
                ctx.fillRect(-19, -65, 38, 38);
                ctx.fillStyle = this.state === 'stun' ? '#000' : '#fff';
                const eyeX = this.facing === 1 ? 8 : -18;
                ctx.fillRect(eyeX, -53, 10, 5);
                ctx.fillStyle = bodyColor;
                ctx.fillRect(-25, -23, 50, 88);
                this.drawKatana();
                ctx.restore();
                if (this.state === 'attack') this.drawSlashEffect();
            }

            drawKatana() {
                const isAction = ['attack', 'windup', 'ult_charge'].includes(this.state);
                const handX = this.facing === 1 ? 25 : -25;
                const handY = 20;

                ctx.save();
                if (isAction) {
                    ctx.translate(handX, handY);
                    let angle = this.facing === 1 ? -Math.PI/1.2 : Math.PI/1.2;
                    if (this.state === 'attack') {
                        const p = (Date.now() - this.timer) / 150;
                        angle += this.facing * (Math.PI * 1.5 * p);
                    }
                    ctx.rotate(angle);
                    ctx.fillStyle = '#1e293b'; ctx.fillRect(-3, 0, 6, 25);
                    ctx.fillStyle = this.isUlt ? '#ef4444' : '#fbbf24'; ctx.fillRect(-10, 25, 20, 4);
                    const bladeGrad = ctx.createLinearGradient(0, 29, 0, 120);
                    bladeGrad.addColorStop(0, this.isUlt ? '#f87171' : '#f1f5f9');
                    bladeGrad.addColorStop(1, 'transparent');
                    ctx.fillStyle = bladeGrad;
                    ctx.beginPath(); ctx.moveTo(-2, 29); ctx.lineTo(2, 29); ctx.lineTo(0, this.isUlt ? 160 : 100); ctx.fill();
                } else {
                    ctx.translate(this.facing === 1 ? -22 : 22, 35);
                    ctx.rotate(this.facing * Math.PI/6);
                    ctx.fillStyle = '#000'; ctx.fillRect(this.facing === 1 ? -40 : 0, -3, 40, 7);
                    ctx.fillStyle = this.state === 'parry' ? '#fbbf24' : '#1e293b';
                    ctx.fillRect(this.facing === 1 ? -50 : 40, -4, 12, 9);
                }
                ctx.restore();
            }

            drawSlashEffect() {
                const p = (Date.now() - this.timer) / 150;
                const reach = this.isUlt ? 320 : 180;
                ctx.save();
                ctx.beginPath();
                ctx.strokeStyle = this.isUlt ? 'rgba(239, 68, 68, 0.6)' : 'rgba(255,255,255,0.4)';
                ctx.lineWidth = this.isUlt ? 30 : 10;
                const cx = this.pos.x + this.width/2;
                const cy = this.pos.y + this.height/2;
                const start = this.facing === 1 ? -Math.PI/2 : Math.PI*1.5;
                ctx.arc(cx, cy, reach, start, start + (this.facing * Math.PI * p * 1.5), this.facing === -1);
                ctx.stroke();
                ctx.restore();
            }

            update(opp) {
                const now = Date.now();
                if (this.state === 'windup' && now > this.timer + config.attackWindup) {
                    this.state = 'attack'; this.timer = now; this.checkHit(opp);
                }
                if (this.state === 'attack' && now > this.timer + 150) {
                    this.state = 'idle'; this.isUlt = false;
                }
                if (this.state === 'parry' && now > this.timer + config.parryWindow) {
                    this.state = 'stun'; this.timer = now + 1500;
                    spawnParticles(this.pos.x + this.width/2, this.pos.y + 40, '#64748b', 10);
                }
                if (this.state === 'stun' && now > this.timer) this.state = 'idle';
                if (this.state === 'ult_charge' && now > this.timer + config.ultCharge) {
                    this.state = 'attack'; this.isUlt = true; this.timer = now; this.checkHit(opp);
                }

                if (['idle', 'windup'].includes(this.state)) this.pos.x += this.vel.x;
                this.pos.y += this.vel.y;
                if (this.pos.y + this.height >= config.groundY) {
                    this.pos.y = config.groundY - this.height; this.vel.y = 0;
                } else this.vel.y += config.gravity;

                this.pos.x = Math.max(0, Math.min(canvas.width - this.width, this.pos.x));
                if (this.state === 'idle') this.facing = this.pos.x < opp.pos.x ? 1 : -1;

                this.updateUI(now);
                this.draw();
            }

            updateUI(now) {
                const updateBar = (id, cur, max) => {
                    const el = document.getElementById(id);
                    if (el) el.style.width = Math.min(100, ((now - cur) / max) * 100) + '%';
                };
                updateBar(`p${this.id}-${this.id===1?'s':'k'}-cd`, this.lastCD.slash, config.slashCD);
                updateBar(`p${this.id}-${this.id===1?'q':'u'}-cd`, this.lastCD.parry, config.parryCD);
                updateBar(`p${this.id}-${this.id===1?'e':'o'}-cd`, this.lastCD.ult, config.ultCD);
            }

            attack() {
                if (this.state !== 'idle' || Date.now() - this.lastCD.slash < config.slashCD) return;
                this.state = 'windup'; this.timer = Date.now(); this.lastCD.slash = Date.now();
            }

            parry() {
                if (this.state !== 'idle' || Date.now() - this.lastCD.parry < config.parryCD) return;
                this.state = 'parry'; this.timer = Date.now(); this.lastCD.parry = Date.now();
            }

            ult() {
                if (this.state !== 'idle' || Date.now() - this.lastCD.ult < config.ultCD) return;
                this.state = 'ult_charge'; this.timer = Date.now(); this.lastCD.ult = Date.now();
            }

            dash(dir) {
                if (this.state !== 'idle' || Date.now() < this.dashCD) return;
                this.pos.x += dir * 120;
                this.dashCD = Date.now() + 600;
                spawnParticles(this.pos.x, this.pos.y + this.height - 20, this.color, 15);
            }

            checkHit(opp) {
                const reach = this.isUlt ? 320 : 180;
                const hitX = this.facing === 1 ? this.pos.x + this.width : this.pos.x - reach;
                if (hitX < opp.pos.x + opp.width && hitX + reach > opp.pos.x) {
                    if (opp.state === 'parry') {
                        this.state = 'stun'; this.timer = Date.now() + (this.isUlt ? 6000 : 2000);
                        opp.state = 'idle'; opp.lastCD.parry = 0;
                        showNotice("PARRIED", "text-yellow-400");
                        screenShake(20);
                        spawnParticles(opp.pos.x, opp.pos.y + 50, '#fbbf24', 30);
                    } else {
                        opp.health -= this.isUlt ? 45 : 15;
                        opp.state = 'stun'; opp.timer = Date.now() + 300;
                        screenShake(this.isUlt ? 25 : 8);
                        spawnParticles(opp.pos.x + opp.width/2, opp.pos.y + 60, opp.color, 20);
                    }
                }
            }
        }

        const p1 = new Fighter({ pos: { x: 200, y: 0 }, color: '#3b82f6', id: 1 });
        const p2 = new Fighter({ pos: { x: 850, y: 0 }, color: '#ef4444', id: 2 });

        function spawnParticles(x, y, color, count) {
            for(let i=0; i<count; i++) particles.push(new Particle(x, y, color, 8));
        }

        function screenShake(amt) {
            const container = document.getElementById('game-container');
            container.style.transform = `translate(${(Math.random()-0.5)*amt}px, ${(Math.random()-0.5)*amt}px)`;
            setTimeout(() => container.style.transform = 'none', 100);
        }

        function showNotice(text, cls) {
            const el = document.getElementById('notice-display');
            el.innerText = text; el.className = `absolute ${cls}`; el.style.opacity = '1';
            setTimeout(() => el.style.opacity = '0', 1000);
        }

        function drawBackground() {
            ctx.fillStyle = '#020617'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(59, 130, 246, 0.1)';
            for(let i=0; i<canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
            for(let i=0; i<canvas.height; i+=50) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke(); }
            ctx.fillStyle = '#1e293b'; ctx.fillRect(0, config.groundY, canvas.width, canvas.height - config.groundY);
        }

        function handleInput() {
            if (!gameActive) return;
            p1.vel.x = 0;
            if (['idle', 'windup'].includes(p1.state)) {
                if (keys['a']) p1.vel.x = -config.moveSpeed;
                if (keys['d']) p1.vel.x = config.moveSpeed;
            }
            p2.vel.x = 0;
            if (['idle', 'windup'].includes(p2.state)) {
                if (keys['j']) p2.vel.x = -config.moveSpeed;
                if (keys['l']) p2.vel.x = config.moveSpeed;
            }
        }

        function gameLoop() {
            if (!gameActive) return;
            drawBackground();
            handleInput();
            particles = particles.filter(p => { p.update(); p.draw(); return p.life > 0; });
            p1.update(p2); p2.update(p1);
            if (p1.health <= 0) endGame("PLAYER 2 VICTORIOUS");
            else if (p2.health <= 0) endGame("PLAYER 1 VICTORIOUS");
            requestAnimationFrame(gameLoop);
        }

        function endGame(msg) {
            gameActive = false;
            document.getElementById('win-text').innerText = msg;
            document.getElementById('overlay').style.display = 'flex';
        }

        // --- Mobile Logic Helper ---
        function setupMobileBtn(id, key, action) {
            const btn = document.getElementById(id);
            if(!btn) return;
            const start = (e) => { 
                e.preventDefault(); 
                keys[key] = true; 
                if (action) action();
            };
            const end = (e) => { e.preventDefault(); keys[key] = false; };
            btn.addEventListener('touchstart', start);
            btn.addEventListener('touchend', end);
            btn.addEventListener('mousedown', start);
            btn.addEventListener('mouseup', end);
        }

        // P1 Controls
        setupMobileBtn('btn-p1-a', 'a');
        setupMobileBtn('btn-p1-d', 'd');
        setupMobileBtn('btn-p1-w', 'w', () => { if(p1.pos.y >= config.groundY - p1.height) p1.vel.y = config.jumpForce; });
        setupMobileBtn('btn-p1-s', 's', () => p1.attack());
        setupMobileBtn('btn-p1-q', 'q', () => p1.parry());
        setupMobileBtn('btn-p1-e', 'e', () => p1.ult());
        setupMobileBtn('btn-p1-dash', 'shift', () => p1.dash(keys['a'] ? -1 : 1));

        // P2 Controls
        setupMobileBtn('btn-p2-j', 'j');
        setupMobileBtn('btn-p2-l', 'l');
        setupMobileBtn('btn-p2-i', 'i', () => { if(p2.pos.y >= config.groundY - p2.height) p2.vel.y = config.jumpForce; });
        setupMobileBtn('btn-p2-k', 'k', () => p2.attack());
        setupMobileBtn('btn-p2-u', 'u', () => p2.parry());
        setupMobileBtn('btn-p2-o', 'o', () => p2.ult());
        setupMobileBtn('btn-p2-dash', ' ', () => p2.dash(keys['j'] ? -1 : 1));

        // Keyboard Support
        window.addEventListener('keydown', e => { 
            const k = e.key.toLowerCase();
            keys[k] = true; 
            if (k === 'w' && p1.pos.y >= config.groundY - p1.height) p1.vel.y = config.jumpForce;
            if (k === 's') p1.attack(); if (k === 'q') p1.parry(); if (k === 'e') p1.ult();
            if (e.code === 'ShiftLeft') p1.dash(keys['a'] ? -1 : 1);
            if (k === 'i' && p2.pos.y >= config.groundY - p2.height) p2.vel.y = config.jumpForce;
            if (k === 'k') p2.attack(); if (k === 'u') p2.parry(); if (k === 'o') p2.ult();
            if (e.code === 'Space') p2.dash(keys['j'] ? -1 : 1);
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        setInterval(() => { if (gameActive) { timeLeft--; document.getElementById('timer').innerText = timeLeft; if (timeLeft <= 0) endGame("DRAW"); } }, 1000);
        gameLoop();
    </script>
</body>
</html>
